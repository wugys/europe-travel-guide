<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>TravelMind AI - 系統入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 15px; }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .version { 
            background: #667eea; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 15px; 
            font-size: 13px;
            display: inline-block;
            margin-bottom: 20px;
        }
        p { color: #666; margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .note { 
            margin-top: 15px; 
            padding: 10px; 
            background: #e8f4fd; 
            border-radius: 8px; 
            font-size: 12px;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✈️</div>
        <h1>TravelMind AI</h1>
        <div class="version">v3.0.1</div>
        
        <p>首次使用或更新後，請先清除快取</p>
        
        <a href="index.html?v=3.0.1" class="btn" id="enterBtn">
            🚀 進入系統
        </a>
        
        <button class="btn btn-secondary" onclick="clearCache()">
            🧹 清除快取並進入
        </button>
        
        <div class="note" id="status">
            點擊「進入系統」開始使用
        </div>
    </div>
    
    <script>
        function clearCache() {
            var status = document.getElementById('status');
            status.textContent = '清除中...';
            
            // Clear localStorage
            try {
                localStorage.clear();
            } catch(e) {}
            
            // Clear sessionStorage
            try {
                sessionStorage.clear();
            } catch(e) {}
            
            // Unregister Service Workers
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    regs.forEach(function(reg) {
                        reg.unregister();
                    });
                    // Redirect after clearing
                    setTimeout(function() {
                        window.location.href = 'index.html?v=3.0.1&fresh=1';
                    }, 500);
                }).catch(function() {
                    // If fails, redirect anyway
                    window.location.href = 'index.html?v=3.0.1&fresh=1';
                });
            } else {
                // No SW support, just redirect
                window.location.href = 'index.html?v=3.0.1&fresh=1';
            }
        }
        
        // Update status
        document.getElementById('status').textContent = '系統就緒，請點擊進入';
    </script>
</body>
</html>
