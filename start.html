<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>TravelMind AI v3.0</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 12px; color: #1a1a2e; }
        p { color: #666; margin-bottom: 24px; line-height: 1.6; }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #d4a5a5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .version { font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✈️</div>
        <h1>TravelMind AI</h1>
        <p>歐洲旅遊隨行智遊系統<br>奧地利 · 捷克 · 斯洛伐克 · 匈牙利</p>
        
        <a href="https://wugys.github.io/europe-travel-guide/index.html?v=36&nocache=1" class="btn" id="enter-btn">
            進入系統 (清除快取)
        </a>
        
        <button class="btn btn-secondary" onclick="clearCache()">
            強制清除瀏覽器快取
        </button>
        
        <div class="version">v3.0 Batch 2 | Build 36</div>
    </div>
    
    <script>
        function clearCache() {
            // 嘗試清除各種快取
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            
            // 清除 localStorage
            localStorage.clear();
            
            // 清除 sessionStorage
            sessionStorage.clear();
            
            // 重新載入
            location.reload(true);
        }
        
        // 自動帶入 nocache 參數
        document.getElementById('enter-btn').addEventListener('click', function(e) {
            e.preventDefault();
            var url = this.href + '&t=' + Date.now();
            location.href = url;
        });
        
        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
